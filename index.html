<!DOCTYPE html>
<html>
<head>

<title>Bulldblox</title>
<link rel="icon" href="Bulldblox.png" type="image/x-icon">
</head>
<link rel="stylesheet" type="text/css" href="openhouse.css">
<br><br>
<body>
    <img src="fondobulldblox.png" id="full-screen-background-image"/>
<table align="center" width="70%">
     <section style="margin-bottom: 100px;"></section>
    <tr>
        <td align="center">
            <section style="margin-top: 100px;"></section>
          <center><form>
                <h1>Iniciar sesión en Bulldblox</h1>
            <section style="margin-top: 50px;"></section>
                <label for="username"><h2>Usuario:</h2></label><br>
                <input type="text" id="username" name="username" class="field"><br>
            <section style="margin-top: 25px;"></section>
                <label for="password"><h2>Contraseña:</h2></label><br>
                <input type="password" id="password" name="password" class="field"><br>
                <p class="center-content">
                    <section style="margin-top: 25px;"></section>
                    <button type="submit" class="btn btn-gray">Iniciar sesión</button></p>
            </form></center>
        </td>
    </tr>
</table>
<script src="openhouse.js">
    </script>
</body>
</html>
